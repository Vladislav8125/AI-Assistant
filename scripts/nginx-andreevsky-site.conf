# Static site for andreevskyfund.ru
# Mount this directory as document root, e.g.:
#   /opt/andreevsky-site:/usr/share/nginx/html:ro

server {
    listen 80;
    listen [::]:80;
    server_name andreevskyfund.ru www.andreevskyfund.ru andreevskyfund.isgood.host;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location = /404.html {
        internal;
    }

    error_page 404 /404.html;

    location ~* \.(css|js|json|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
